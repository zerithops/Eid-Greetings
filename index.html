<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Zerith</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 2.5rem;
    margin-top: 50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ffcc; }
    to { text-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc; }
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
    background: #00ffcc;
    color: black;
    transition: 0.3s;
}

button:hover {
    background: #00ccaa;
    transform: scale(1.05);
}

.card {
    margin-top: 30px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    display: none;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.money {
    font-size: 22px;
    margin-top: 15px;
    color: #00ffcc;
    font-weight: bold;
}

.footer {
    margin-top: 50px;
    font-size: 14px;
    opacity: 0.7;
}
</style>

</head>
<body>

<div class="container">

<h1>🌙 Eid Mubarak 🎉</h1>

<p>Click below to receive your Eid greeting 😌</p>

<button onclick="showGreeting()">Open Greeting</button>

<div class="card" id="greetingCard">
    <h2>✨ Eid Mubarak from Zerith ✨</h2>
    <p>Allah tomar shob iccha puron koruk 🤲  
    Shukhe thako, bhalo thako ❤️</p>

    <div class="money">
        💸 Ebar Salami Dao 😆
    </div>

    <button onclick="askSalami()">Send Salami</button>

    <p id="salamiMsg"></p>
</div>

<div class="footer">
    Made with ❤️ by Zerith
</div>

</div>

<script>
function showGreeting() {
    document.getElementById("greetingCard").style.display = "block";
}

function askSalami() {
    document.getElementById("salamiMsg").innerHTML =
        "😎 Bkash / Nagad e pathao... na hole next Eid e blocked!";
}
</script>

</body>
</html>
