<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  width: 90%;
  max-width: 350px;
  text-align: center;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  background: #00ffcc;
  color: black;
  cursor: pointer;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.95);
}

.card {
  margin-top: 20px;
  padding: 18px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  display: none;
  animation: pop 0.4s ease;
}

@keyframes pop {
  from {transform: scale(0.8); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

.salami {
  margin-top: 15px;
  font-weight: bold;
  color: #00ffcc;
}

.bkash {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}
</style>

</head>
<body>

<div class="container">

<h1>🌙 Eid Mubarak</h1>
<p>Tap below 👇</p>

<button class="btn" onclick="openCard()">Open</button>

<div class="card" id="card">
  <h2>✨ Eid Mubarak Zerith</h2>
  <p>Allah tomar shob iccha puron koruk 🤲</p>

  <div class="salami">💸 Salami dite hobe 😏</div>

  <button class="btn" onclick="copyNumber()">Send bKash</button>

  <div class="bkash" id="number"></div>
</div>

</div>

<script>
function openCard() {
  document.getElementById("card").style.display = "block";
}

function copyNumber() {
  const num = "01953275450";
  navigator.clipboard.writeText(num);
  document.getElementById("number").innerHTML =
    "Number Copied ✅ " + num;
}
</script>

</body>
</html>
