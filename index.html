  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-pale: #f5e9c0;
      --deep: #0a0814;
      --mid: #140f2a;
      --accent: #7b3fa0;
      --teal: #1a8a7a;
      --white: #fefdf8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--deep);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* \u2500\u2500 CANVAS STARS \u2500\u2500 */
    #starCanvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* \u2500\u2500 FLOATING PARTICLES \u2500\u2500 */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* \u2500\u2500 LANTERNS \u2500\u2500 */
    .lanterns { position: fixed; top: 0; width: 100%; z-index: 2; pointer-events: none; }
    .lantern-wrap { position: absolute; top: -10px; transform-origin: top center; }

    .lantern-wrap:nth-child(2) { left: 20%; animation: sway 5s ease-in-out infinite reverse; animation-delay: -1s; }
    .lantern-wrap:nth-child(3) { left: 78%; animation: sway 4.5s ease-in-out infinite; animation-delay: -2s; }
    .lantern-wrap:nth-child(4) { left: 92%; animation: sway 3.8s ease-in-out infinite reverse; animation-delay: -0.5s; }
